<script>
(function () {
  var nav = document.getElementById('cba-nav');
  var hamburger = document.getElementById('cba-hamburger');
  var overlay = document.getElementById('cba-nav-overlay');
  var closeBtn = document.getElementById('cba-overlay-close');

  window.addEventListener('scroll', function () {
    nav.classList.toggle('cba-nav-scrolled', window.scrollY > 10);
  }, { passive: true });

  hamburger.addEventListener('click', function () {
    overlay.classList.add('is-open');
    hamburger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  });

  closeBtn.addEventListener('click', function () {
    overlay.classList.remove('is-open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  });

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) {
      overlay.classList.remove('is-open');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }
  });
}());
</script>
